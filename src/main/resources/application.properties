spring.application.name=carfixrwanda

spring.datasource.url=jdbc:mysql://localhost:3306/carfix_rwanda
spring.datasource.username=root
# Prefer environment-specific secrets in deployment (e.g. SPRING_DATASOURCE_PASSWORD).
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root1234}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.thymeleaf.cache=false

server.port=8081