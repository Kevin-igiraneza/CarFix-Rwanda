<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Mechanic - CarFix Rwanda</title>
    <link rel="stylesheet" th:href="@{/style.css}">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #eef4fb 0%, #dfe9f7 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .auth-card {
            width: 100%;
            max-width: 520px;
            background: #ffffff;
            border-radius: 24px;
            padding: 36px 32px;
            box-shadow: 0 20px 45px rgba(15, 23, 42, 0.08);
            border: 1px solid #e5edf7;
        }

        .auth-card h1 {
            margin-bottom: 10px;
            font-size: 32px;
            font-weight: 800;
            color: #0f172a;
        }

        .auth-card p {
            margin-bottom: 24px;
            color: #64748b;
            font-size: 15px;
            line-height: 1.6;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .form-row {
            display: flex;
            gap: 16px;
        }

        .form-row .form-group {
            flex: 1;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 13px;
            font-weight: 600;
            color: #334155;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .form-group input {
            width: 100%;
            height: 48px;
            border: 1px solid #dbe4f0;
            border-radius: 12px;
            padding: 0 16px;
            font-size: 14px;
            color: #0f172a;
            background: #f8fbff;
            outline: none;
            transition: 0.2s ease;
        }

        .form-group input:focus {
            border-color: #1d4ed8;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(29, 78, 216, 0.08);
        }

        .auth-btn {
            width: 100%;
            height: 50px;
            border: none;
            border-radius: 14px;
            background: #0f4aa3;
            color: white;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.2s ease;
        }

        .auth-btn:hover {
            background: #0b3d88;
        }

        .auth-link-text {
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
            color: #64748b;
        }

        .auth-link-text a {
            color: #1d4ed8;
            font-weight: 700;
            text-decoration: none;
        }

        .auth-link-text a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="auth-card">
    <h1>Register Garage</h1>
    <p>Join the CarFix Rwanda network as a certified mechanic.</p>

    <div th:if="${errorMessage}" style="background:#fef2f2; color:#b91c1c; padding:12px 14px; border-radius:12px; margin-bottom:18px; font-size:14px;">
        <span th:text="${errorMessage}"></span>
    </div>

    <form th:action="@{/save-mechanic}" method="post" class="auth-form">
        <div class="form-row">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="fullName" placeholder="e.g. John Doe" required>
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" name="phoneNumber" placeholder="e.g. 0780000000" required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="john@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Create a secure password" required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Specialization</label>
                <input type="text" name="specialization" placeholder="e.g. Engine Repair" required>
            </div>
            <div class="form-group">
                <label>Vehicle Model</label>
                <input type="text" name="supportedVehicleModel" placeholder="e.g. Toyota, BMW" required>
            </div>
        </div>

        <div class="form-group">
            <label>Garage Location</label>
            <input type="text" name="garageLocation" placeholder="e.g. Kigali, Remera" required>
        </div>

        <button type="submit" class="auth-btn">Submit Registration</button>
    </form>

    <div class="auth-link-text">
        <a href="/mechanics">← Back to Mechanics List</a>
    </div>
</div>

</body>
</html>
