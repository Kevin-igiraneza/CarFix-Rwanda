<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Mechanic - CarFix Rwanda</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">CarFix Rwanda</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/">Home</a>
            <a class="nav-link" href="/mechanics">Mechanics</a>
            <a class="nav-link active" href="/add-mechanic">Add Mechanic</a>
        </div>
    </div>
</nav>

<section class="py-5" style="background-color: #eef4fb; min-height: 80vh;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="custom-form">
                    <h1 class="section-title text-center">Register a Mechanic</h1>
                    <p class="text-center text-muted mb-4">
                        Add a new mechanic profile to CarFix Rwanda.
                    </p>

                    <form action="/save-mechanic" method="post">
                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" name="fullName" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Specialization</label>
                            <input type="text" name="specialization" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Supported Vehicle Model</label>
                            <input type="text" name="supportedVehicleModel" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Phone Number</label>
                            <input type="text" name="phoneNumber" class="form-control" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Garage Location</label>
                            <input type="text" name="garageLocation" class="form-control" required>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">Save Mechanic</button>
                            <a href="/mechanics" class="btn btn-outline-dark">Back to Mechanics</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>

<footer class="footer-section text-center">
    <div class="container">
        <p class="mb-0">© 2026 CarFix Rwanda. All rights reserved.</p>
    </div>
</footer>

</body>
</html>
