<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - CarFix Rwanda</title>
    <link rel="stylesheet" th:href="@{/style.css?v=18}">
    <!-- Inline theme toggle — runs immediately so button works before defer scripts load -->
    <script>
        (function() {
            // Apply saved theme right away (prevents flash)
            var saved = localStorage.getItem('cfr-theme') || 'light';
            document.documentElement.setAttribute('data-theme', saved);

            // Define toggleTheme globally so onclick="toggleTheme()" always works
            window.toggleTheme = function() {
                var html = document.documentElement;
                var current = html.getAttribute('data-theme') || 'light';
                var next = current === 'dark' ? 'light' : 'dark';
                html.setAttribute('data-theme', next);
                localStorage.setItem('cfr-theme', next);

                // Update all toggle button icons
                document.querySelectorAll('#themeToggleBtn, .topbar-icon-btn[aria-label*="Dark"], .topbar-icon-btn[aria-label*="Light"]').forEach(function(btn) {
                    var moon = btn.querySelector('.moon-icon');
                    var sun  = btn.querySelector('.sun-icon');
                    if (moon && sun) {
                        moon.style.display = next === 'dark' ? 'none' : 'inline-block';
                        sun.style.display  = next === 'dark' ? 'inline-block' : 'none';
                    }
                    btn.title = next === 'dark' ? 'Switch to Light Mode' : 'Switch to Dark Mode';
                    btn.setAttribute('aria-label', next === 'dark' ? 'Switch to light mode' : 'Switch to dark mode');
                });
            };

            // Also sync icons once DOM is ready
            document.addEventListener('DOMContentLoaded', function() {
                var theme = localStorage.getItem('cfr-theme') || 'light';
                document.querySelectorAll('#themeToggleBtn, .topbar-icon-btn').forEach(function(btn) {
                    var moon = btn.querySelector('.moon-icon');
                    var sun  = btn.querySelector('.sun-icon');
                    if (moon && sun) {
                        moon.style.display = theme === 'dark' ? 'none' : 'inline-block';
                        sun.style.display  = theme === 'dark' ? 'inline-block' : 'none';
                    }
                    btn.querySelectorAll('svg, path, circle').forEach(function(el) {
                        el.style.pointerEvents = 'none';
                    });
                });
            });
        })();
    </script>
    <script defer th:src="@{/app-dialogs.js}"></script>
    <script defer th:src="@{/theme-lang.js?v=18}"></script>
</head>
<body class="app-page auth-page login-page">

<!-- Theme & Language controls (floating) -->
<div style="position:fixed;top:16px;right:16px;z-index:9999;" class="tl-controls">
    <button id="themeToggleBtn" onclick="toggleTheme()" title="Toggle Dark Mode" aria-label="Toggle Dark Mode" style="background:transparent;border:none;cursor:pointer;color:inherit;display:inline-flex;align-items:center;justify-content:center;padding:6px;border-radius:10px;">
    <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="width:20px;height:20px;">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
    </svg>
    <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="display:none;width:20px;height:20px;">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
    </svg>
</button>
</div>

<div class="auth-card">
    <div style="margin-bottom:14px;">
        <a href="/" class="auth-back-link" data-i18n="login.back">&larr; Back to home</a>
    </div>
    <div class="login-tabs">
        <button type="button" class="tab-btn active" onclick="switchTab('CUSTOMER', this)" data-i18n="login.tab_customer">Customer</button>
        <button type="button" class="tab-btn" onclick="switchTab('MECHANIC', this)" data-i18n="login.tab_mechanic">Mechanic</button>
        <button type="button" class="tab-btn" onclick="switchTab('ADMIN', this)" data-i18n="login.tab_admin">Admin</button>
    </div>

    <h1 id="login-title" data-i18n="login.customer_title">Customer Login</h1>
    <p id="login-desc" style="margin-bottom: 24px; color: #64748b; font-size: 16px; line-height: 1.6;" data-i18n="login.customer_desc">Sign in to book repairs and manage your vehicles.</p>

    <div th:if="${param.error}" class="auth-error" data-i18n="login.error">
        Invalid email or password.
    </div>

    <div th:if="${param.logout}" class="auth-success" data-i18n="login.logout_ok">
        You have been logged out successfully.
    </div>

    <div th:if="${param.registered}" class="auth-success">
        Account created. Sign in with your email and password (use the <strong>Mechanic</strong> or <strong>Customer</strong> tab to match your account type).
    </div>

    <form th:action="@{/login}" method="post" class="auth-form">
        <input type="hidden" name="loginRole" id="loginRoleInput" value="CUSTOMER">
        <div class="form-group">
            <label data-i18n="login.label_email">Email</label>
            <input type="email" name="username" placeholder="Enter your email" data-i18n="login.placeholder_email" required>
        </div>

        <div class="form-group">
            <label data-i18n="login.label_password">Password</label>
            <input type="password" name="password" placeholder="Enter your password" data-i18n="login.placeholder_password" required>
        </div>

        <button type="submit" class="auth-btn" data-i18n="login.submit">Sign In</button>
    </form>

    <div class="auth-link-text">
        <span data-i18n="login.no_account">Don't have an account?</span>
        <a href="/register" data-i18n="login.create_one">Create one</a>
    </div>
</div>

<script>
    var LANG_TITLES = {
        CUSTOMER: { en: 'Customer Login', fr: 'Connexion Client', rw: "Kwinjira nk'Umukiriya" },
        MECHANIC: { en: 'Mechanic Portal', fr: 'Portail Mécanicien', rw: "Irembo ry'Imekaniki" },
        ADMIN:    { en: 'Admin Console',   fr: 'Console Administrateur', rw: 'Aho Ubuyobozi Bukora' }
    };
    var LANG_DESCS = {
        CUSTOMER: { en: 'Sign in to book repairs and manage your vehicles.', fr: 'Connectez-vous pour réserver des réparations et gérer vos véhicules.', rw: 'Injira kugira ngo ubone gufata ibyemezo no gucunga imodoka zawe.' },
        MECHANIC: { en: 'Sign in to accept jobs and update service progress.', fr: 'Connectez-vous pour accepter des travaux et mettre à jour la progression.', rw: 'Injira kugira ngo wemere imirimo no gutanga aho akazi kegeze.' },
        ADMIN:    { en: 'Sign in with your administrator credentials.', fr: 'Connectez-vous avec vos identifiants administrateur.', rw: "Injira ukoresheje amakuru yawe y'ubuyobozi." }
    };

    var currentRole = 'CUSTOMER';

    function switchTab(role, btn) {
        currentRole = role;
        document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        document.getElementById('loginRoleInput').value = role;
        var lang = document.documentElement.getAttribute('lang') || 'en';
        var safeL = LANG_TITLES[role][lang] ? lang : 'en';
        document.getElementById('login-title').innerText = LANG_TITLES[role][safeL];
        document.getElementById('login-desc').innerText  = LANG_DESCS[role][safeL];
    }

    // Hook called by theme-lang.js after every applyLanguage() call
    // theme-lang.js checks window._afterLangApply if it exists
    window._afterLangApply = function(lang) {
        var safeL = LANG_TITLES[currentRole][lang] ? lang : 'en';
        var titleEl = document.getElementById('login-title');
        var descEl  = document.getElementById('login-desc');
        if (titleEl) titleEl.innerText = LANG_TITLES[currentRole][safeL];
        if (descEl)  descEl.innerText  = LANG_DESCS[currentRole][safeL];
    };
</script>

</body>
</html>
