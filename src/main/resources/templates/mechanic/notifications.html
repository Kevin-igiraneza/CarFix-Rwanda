<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Notifications - Mechanic - CarFix Rwanda</title>
    <link rel="stylesheet" th:href="@{/style.css?v=18}">
    <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('cfr-theme') || 'light');</script>
    <script defer th:src="@{/app-dialogs.js}"></script>
    <script defer th:src="@{/dashboard-sidebar.js}"></script>
</head>
<body class="app-page mechanic-page">

<div class="mechanic-layout dashboard-shell">

    <aside class="mechanic-sidebar dashboard-sidebar">
        <div class="dashboard-sidebar-top">
            <div class="dashboard-brand-shell">
                <div class="dashboard-brand-badge">M</div>
                <div class="dashboard-brand-copy">
                    <div class="mechanic-brand">CarFix Rwanda</div>
                    <div class="mechanic-subtitle">MECHANIC PORTAL</div>
                </div>
            </div>
            <nav class="mechanic-menu dashboard-menu">
                <a href="/real-mechanic-dashboard" class="dashboard-menu-link">
                    <span class="dashboard-menu-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1.5"></rect><rect x="14" y="3" width="7" height="7" rx="1.5"></rect><rect x="3" y="14" width="7" height="7" rx="1.5"></rect><rect x="14" y="14" width="7" height="7" rx="1.5"></rect></svg></span>
                    <span data-i18n="dash.my_jobs">My jobs</span>
                </a>
                <a href="/mechanics" class="dashboard-menu-link">
                    <span class="dashboard-menu-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M16 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="10" cy="7" r="4"></circle><path d="M20 8v6"></path><path d="M23 11h-6"></path></svg></span>
                    <span data-i18n="dash.directory">Directory</span>
                </a>
                <a href="/mechanic/notifications" class="active dashboard-menu-link nav-item-with-badge">
                    <span class="dashboard-menu-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg></span>
                    <span>Notifications</span>
                    <span th:if="${unreadNotificationCount > 0}" class="notification-badge" th:text="${unreadNotificationCount}">0</span>
                </a>
            </nav>
        </div>
        <div class="dashboard-sidebar-footer">
            <form th:action="@{/logout}" method="post" style="margin: 0;">
                <button type="submit" class="sidebar-logout-btn">
                    <svg style="width:20px;height:20px;" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                    <span>Logout</span>
                </button>
            </form>
        </div>
    </aside>

    <main class="mechanic-main">
        <header class="mechanic-topbar">
            <h2>Notifications</h2>
            <div class="mechanic-profile-box">
                <div class="mechanic-profile-avatar" th:text="${currentUser.fullName != null ? #strings.substring(currentUser.fullName,0,1) : 'M'}">M</div>
                <div class="mechanic-profile-name" th:text="${currentUser.fullName}">Name</div>
            </div>
        </header>

        <section class="notifications-container" style="padding: 24px;">
            <div class="mark-read-header">
                <h3>Incoming Work</h3>
                <form th:action="@{/mechanic/notifications/mark-all-read}" method="post">
                    <button type="submit" class="mark-read-btn">Mark all as read</button>
                </form>
            </div>

            <div th:each="n : ${notifications}" class="notification-card" th:classappend="${!n.read ? 'unread' : ''}">
                <div class="notification-icon" th:classappend="${n.type.name() == 'REQUEST_ASSIGNED' ? 'blue' : 'blue'}">
                    <i class="fas fa-tools">🛠️</i>
                </div>
                <div class="notification-content">
                    <h4 th:text="${n.title}">New Service Request</h4>
                    <p th:text="${n.message}">A customer has assigned you a job.</p>
                    
                    <!-- Accept/Reject buttons if it's a new assignment and not yet handled -->
                    <div th:if="${n.type.name() == 'REQUEST_ASSIGNED' && n.link != null && n.link.contains('requestId=')}" class="notification-actions" style="display:flex; gap:10px; margin-top: 14px;">
                        <!-- relatedUrl for mechanic points to the requestId -->
                        <form th:action="@{/mechanic/accept-request}" method="post">
                            <input type="hidden" name="requestId" th:value="${n.link.split('=')[1]}">
                            <button type="submit" class="approve-btn">Accept Job</button>
                        </form>
                        <form th:action="@{/mechanic/reject-request}" method="post">
                            <input type="hidden" name="requestId" th:value="${n.link.split('=')[1]}">
                            <button type="submit" class="reject-btn">Reject</button>
                        </form>
                    </div>

                    <div class="notification-meta" style="margin-top: 12px;">
                        <span class="notification-time" th:text="${#temporals.format(n.createdAt, 'MMM dd, HH:mm')}">Time</span>
                    </div>
                </div>
            </div>

            <div th:if="${notifications == null || notifications.isEmpty()}" style="text-align: center; padding: 60px 0; color: #64748b;">
                <div style="font-size: 48px; margin-bottom: 16px;">📭</div>
                <p>No new notifications.</p>
            </div>
        </section>
    </main>
</div>

</body>
</html>
