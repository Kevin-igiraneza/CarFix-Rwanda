<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Expert Mechanics - CarFix Rwanda</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">CarFix Rwanda</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/">Home</a>
            <a class="nav-link active" href="/mechanics">Mechanics</a>
            <a class="nav-link" href="/add-mechanic">Add Mechanic</a>
        </div>
    </div>
</nav>

<section class="py-5" style="background-color: #eef4fb;">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1 class="section-title mb-1">Available Mechanics</h1>
                <p class="text-muted mb-0">Browse registered mechanics in CarFix Rwanda.</p>
            </div>
            <a href="/add-mechanic" class="btn btn-primary">Add New Mechanic</a>
        </div>

        <div class="table-responsive custom-table p-3">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-primary">
                <tr>
                    <th>ID</th>
                    <th>Full Name</th>
                    <th>Specialization</th>
                    <th>Supported Vehicle Model</th>
                    <th>Phone Number</th>
                    <th>Garage Location</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="mechanic : ${mechanics}">
                    <td th:text="${mechanic.id}"></td>
                    <td th:text="${mechanic.fullName}"></td>
                    <td th:text="${mechanic.specialization}"></td>
                    <td th:text="${mechanic.supportedVehicleModel}"></td>
                    <td th:text="${mechanic.phoneNumber}"></td>
                    <td th:text="${mechanic.garageLocation}"></td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="mt-4">
            <a href="/" class="btn btn-outline-dark">Back to Home</a>
        </div>
    </div>
</section>

<footer class="footer-section text-center">
    <div class="container">
        <p class="mb-0">© 2026 CarFix Rwanda. All rights reserved.</p>
    </div>
</footer>

</body>
</html>
